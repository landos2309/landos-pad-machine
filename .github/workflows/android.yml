name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId": "com.landos.pad", "appName": "LandosPad", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android --no-interactive || true
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
